<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — To Do List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #F5F5F0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      border-top: 4px solid #FFCC00;
    }

    .logo {
      width: 56px;
      height: 56px;
      background: #FFCC00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.6rem;
    }

    h1 { font-size: 1.5rem; color: #1A1A1A; font-weight: 700; margin-bottom: 8px; }

    .subtitle { font-size: 0.88rem; color: #666; margin-bottom: 28px; line-height: 1.5; }

    .error-msg {
      background: #FEE2E2;
      color: #991B1B;
      font-size: 0.83rem;
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 16px;
      text-align: left;
    }

    .input-group { margin-bottom: 12px; text-align: left; }

    label { display: block; font-size: 0.8rem; font-weight: 600; color: #444; margin-bottom: 5px; }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #E0E0E0;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #1A1A1A;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #FFCC00; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: #1A1A1A;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s;
    }

    .submit-btn:hover { background: #333; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #bbb;
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after { content: ''; flex: 1; height: 1px; background: #E8E8E8; }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 13px 20px;
      background: #FFCC00;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #1A1A1A;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .google-btn:hover { background: #E6B800; }
    .google-logo { width: 20px; height: 20px; flex-shrink: 0; }

    .toggle {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #666;
    }

    .toggle a {
      color: #1A1A1A;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }

    .toggle a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">✓</div>
  <h1>To Do List</h1>
  <p class="subtitle" id="subtitle">Sign in to access your tasks.</p>

  <div id="error-box" class="error-msg" style="display:none"></div>

  <form id="auth-form" method="POST" action="/auth/login">
    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />
    </div>
    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required />
    </div>
    <button type="submit" class="submit-btn" id="submit-btn">Sign In</button>
  </form>

  <div class="divider">or</div>

  <a class="google-btn" href="/auth/google">
    <svg class="google-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Sign in with Google
  </a>

  <div class="toggle">
    <span id="toggle-text">Don't have an account?</span>
    <a id="toggle-link" onclick="toggleMode()">Create one</a>
  </div>
</div>

<script>
  const errors = {
    invalid: 'Invalid email or password.',
    taken: 'An account with that email already exists.',
    short: 'Password must be at least 8 characters.',
    missing: 'Email and password are required.',
    server: 'Something went wrong. Please try again.',
  };

  const params = new URLSearchParams(location.search);
  const mode = params.get('mode');
  const error = params.get('error');

  let isSignup = mode === 'signup';

  function applyMode() {
    const form = document.getElementById('auth-form');
    form.action = isSignup ? '/auth/signup' : '/auth/login';
    document.getElementById('submit-btn').textContent = isSignup ? 'Create Account' : 'Sign In';
    document.getElementById('subtitle').textContent = isSignup
      ? 'Create an account to get started.'
      : 'Sign in to access your tasks.';
    document.getElementById('toggle-text').textContent = isSignup
      ? 'Already have an account?'
      : "Don't have an account?";
    document.getElementById('toggle-link').textContent = isSignup ? 'Sign in' : 'Create one';
  }

  function toggleMode() {
    isSignup = !isSignup;
    document.getElementById('error-box').style.display = 'none';
    applyMode();
  }

  if (error && errors[error]) {
    const box = document.getElementById('error-box');
    box.textContent = errors[error];
    box.style.display = 'block';
  }

  applyMode();
</script>
</body>
</html>
