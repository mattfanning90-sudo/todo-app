<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #3B82F6;
      --primary-hover: #2563EB;
      --bg: #F1F5F9;
      --bg-card: #FFFFFF;
      --text: #0F172A;
      --text-muted: #64748B;
      --text-light: #94A3B8;
      --border: #E2E8F0;
      --border-input: #CBD5E1;
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.1);
      --r-sm: 6px;
      --r-md: 10px;
      --r-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0F172A;
        --bg-card: #1E293B;
        --text: #F1F5F9;
        --text-muted: #94A3B8;
        --text-light: #475569;
        --border: #334155;
        --border-input: #475569;
        --shadow-lg: 0 8px 40px rgba(0,0,0,0.4);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      color: var(--text);
    }

    .card {
      background: var(--bg-card);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-lg);
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      border: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--primary);
      border-radius: var(--r-md);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-name { font-size: 1.2rem; font-weight: 700; color: var(--text); }

    h1 { font-size: 1.3rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }

    .subtitle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }

    .error-msg {
      background: #FEE2E2; color: #991B1B;
      font-size: 0.82rem; padding: 10px 12px;
      border-radius: var(--r-sm); margin-bottom: 16px;
      border: 1px solid #FECACA;
    }

    .input-group { margin-bottom: 12px; }
    label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }

    input[type="email"], input[type="password"] {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid var(--border-input);
      border-radius: var(--r-md); font-size: 0.9rem;
      color: var(--text); background: var(--bg);
      outline: none; font-family: inherit;
      transition: border-color 0.15s;
    }
    input[type="email"]:focus, input[type="password"]:focus {
      border-color: var(--primary);
      background: var(--bg-card);
    }
    input::placeholder { color: var(--text-light); }

    .remember-row {
      display: flex; align-items: center; gap: 8px;
      margin: 8px 0 4px;
    }
    .remember-row input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: var(--primary); cursor: pointer;
      border: none; padding: 0;
    }
    .remember-row label {
      font-size: 0.82rem; color: var(--text-muted);
      cursor: pointer; font-weight: 400; margin: 0;
    }

    .btn-primary {
      width: 100%; padding: 11px;
      background: var(--primary); color: #fff;
      border: none; border-radius: var(--r-md);
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer; margin-top: 8px;
      transition: background 0.15s; font-family: inherit;
    }
    .btn-primary:hover { background: var(--primary-hover); }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 18px 0; color: var(--text-light); font-size: 0.78rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 11px 20px;
      background: var(--bg-card); color: var(--text);
      border: 1.5px solid var(--border-input); border-radius: var(--r-md);
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      text-decoration: none; transition: all 0.15s; font-family: inherit;
    }
    .google-btn:hover { border-color: var(--primary); background: var(--bg); }
    .google-logo { width: 18px; height: 18px; flex-shrink: 0; }

    .toggle { margin-top: 20px; font-size: 0.83rem; color: var(--text-muted); text-align: center; }
    .toggle a { color: var(--primary); font-weight: 600; text-decoration: none; cursor: pointer; }
    .toggle a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    </div>
    <span class="logo-name">Tasks</span>
  </div>

  <h1 id="form-title">Welcome back</h1>
  <p class="subtitle" id="subtitle">Sign in to access your tasks.</p>

  <div id="error-box" class="error-msg" style="display:none"></div>

  <form id="auth-form" method="POST" action="/auth/login">
    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />
    </div>
    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required />
    </div>
    <div class="remember-row" id="remember-row">
      <input type="checkbox" id="remember" name="remember" value="1" />
      <label for="remember">Keep me logged in for 30 days</label>
    </div>
    <button type="submit" class="btn-primary" id="submit-btn">Sign In</button>
  </form>

  <div class="divider">or</div>

  <a class="google-btn" href="/auth/google" id="google-btn">
    <svg class="google-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </a>

  <div class="toggle">
    <span id="toggle-text">Don't have an account?</span>
    <a id="toggle-link" onclick="toggleMode()">Create one</a>
  </div>
</div>

<script>
  const errors = {
    invalid: 'Invalid email or password.',
    taken: 'An account with that email already exists.',
    short: 'Password must be at least 8 characters.',
    missing: 'Email and password are required.',
    server: 'Something went wrong. Please try again.',
  };

  const params = new URLSearchParams(location.search);
  let isSignup = params.get('mode') === 'signup';

  function updateGoogleBtn() {
    const remember = document.getElementById('remember');
    document.getElementById('google-btn').href = remember.checked ? '/auth/google?remember=1' : '/auth/google';
  }

  function applyMode() {
    const form = document.getElementById('auth-form');
    form.action = isSignup ? '/auth/signup' : '/auth/login';
    document.getElementById('form-title').textContent = isSignup ? 'Create account' : 'Welcome back';
    document.getElementById('submit-btn').textContent = isSignup ? 'Create Account' : 'Sign In';
    document.getElementById('subtitle').textContent = isSignup ? 'Get started for free.' : 'Sign in to access your tasks.';
    document.getElementById('toggle-text').textContent = isSignup ? 'Already have an account?' : "Don't have an account?";
    document.getElementById('toggle-link').textContent = isSignup ? 'Sign in' : 'Create one';
    document.getElementById('remember-row').style.display = isSignup ? 'none' : 'flex';
  }

  function toggleMode() {
    isSignup = !isSignup;
    document.getElementById('error-box').style.display = 'none';
    applyMode();
  }

  const error = params.get('error');
  if (error && errors[error]) {
    const box = document.getElementById('error-box');
    box.textContent = errors[error];
    box.style.display = 'block';
  }

  document.getElementById('remember').addEventListener('change', updateGoogleBtn);
  applyMode();
</script>
</body>
</html>
