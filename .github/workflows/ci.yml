name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web tests (vitest + pg-mem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22' # matches package.json engines: >=22.5.0
          cache: npm
      - run: npm ci
      - run: npm test

  ios:
    name: iOS typecheck + tests (jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ios-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ios-app/package-lock.json
      - run: npm ci
      - run: npm run typecheck # tsc --noEmit
      - run: npm run test:ci   # jest --forceExit --runInBand (serial = stable in CI)
